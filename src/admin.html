<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理台 - 教會智能報到系統</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #f6f7f9; color: #1f2933; }
      header, .panel { background: #fff; border: 1px solid #d9dee7; }
      header { border-width: 0 0 1px; }
      .wrap { width: min(1040px, calc(100% - 32px)); margin: 0 auto; }
      .topbar { display: flex; justify-content: space-between; gap: 16px; align-items: center; min-height: 64px; }
      a { color: #14532d; }
      .button { display: inline-flex; align-items: center; justify-content: center; min-height: 40px; padding: 8px 12px; border: 1px solid #166534; background: #166534; color: #fff; text-decoration: none; }
      .button.secondary { border-color: #cfd6df; background: #fff; color: #1f2933; }
      main { padding: 32px 0; }
      h1 { margin: 0 0 8px; font-size: 32px; }
      h2 { margin: 0 0 10px; font-size: 20px; }
      p, li { color: #5f6b7a; line-height: 1.7; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-top: 24px; }
      .panel { padding: 18px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
      .notice { margin-top: 24px; padding: 16px; border: 1px solid #f0d48a; background: #fff8e6; color: #56410f; }
      @media (max-width: 640px) { .topbar, .actions { align-items: stretch; flex-direction: column; } }
    </style>
  </head>
  <body>
    <header><div class="wrap topbar"><strong>管理台</strong><a class="button secondary" href="/index.html">回首頁</a></div></header>
    <main class="wrap"><h1>教會智能報到系統管理台</h1><p>目前此 repo 提供 Docker 入口頁與現有內網通訊錄代理。尚未接上登入、報到 API 或資料庫寫入功能。</p><section class="grid" aria-label="管理功能"><article class="panel"><h2>通訊錄管理</h2><p>開啟既有通訊錄服務，路徑會透過 Nginx 代理到內網主機。</p><div class="actions"><a class="button" href="/addressbook/">開啟通訊錄</a></div></article><article class="panel"><h2>QR 標籤列印</h2><p>製作 30x30mm QR 標籤，可從網址帶入 QR 圖、標題與副標題。</p><div class="actions"><a class="button" href="/qr-label-print.html">開啟列印工具</a></div></article><article class="panel"><h2>服務狀態</h2><p>檢查 Docker/Nginx 健康檢查端點是否正常回應。</p><div class="actions"><a class="button" href="/health">開啟健康檢查</a></div></article></section><section class="notice">若需要完整後台功能，下一步要補上登入、資料表、報到 API、Excel 匯出與權限控管；目前頁面會明確標示尚未實作，避免點擊後沒有反應。</section></main>
  </body>
</html>
